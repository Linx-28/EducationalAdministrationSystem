name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'
        cache: maven

    - name: Create db.properties
      run: |
        cat > src/db.properties << 'EOF'
        jdbc.driver=com.mysql.cj.jdbc.Driver
        jdbc.url=jdbc:mysql://localhost:3306/edu_admin?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
        jdbc.username=root
        jdbc.password=root
        EOF

    - name: Compile Java source
      run: |
        mkdir -p build/classes
        find src -name "*.java" > sources.txt
        javac -d build/classes -cp "web/WEB-INF/lib/*" @sources.txt
      continue-on-error: true

    - name: Check compilation result
      run: |
        if [ -f "sources.txt" ]; then
          echo "Source files found: $(wc -l < sources.txt)"
          echo "Compilation completed."
        fi
